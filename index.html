<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./styles.css">
    <title>PlanDo</title>
  </head>
  <body>
    <div class="page">
      <main class="container">
        <section class="card">
          <h1>PlanDo</h1>
          <div class="hero__controls">
            <span id="networkStatus" class="badge badge--success">Онлайн</span>
            <button id="enablePushBtn" class="button button--secondary button--small" type="button">Включить уведомления</button>
            <button id="disablePushBtn" class="button button--secondary button--small" type="button">Отключить уведомления</button>
          </div>
          <form id="taskForm" class="task-form">
            <input id="taskInput" class="input" name="task" type="text" maxlength="120" placeholder="Текст задачи" autocomplete="off" required>
            <input id="reminderInput" class="input" name="reminder" type="datetime-local">
            <button class="button button--primary" type="submit">Добавить</button>
          </form>
          <div id="taskStats" class="stats">Всего: 0 | Активных: 0 | Выполненных: 0</div>
          <div class="filter-group" role="group">
            <button id="filterAllBtn" class="button button--ghost filter-button" type="button">Все</button>
            <button id="filterActiveBtn" class="button button--ghost filter-button" type="button">Активные</button>
            <button id="filterCompletedBtn" class="button button--ghost filter-button" type="button">Выполненные</button>
          </div>
          <button id="clearCompletedBtn" class="button button--secondary" type="button">Удалить выполненные</button>
          <ul id="taskList" class="task-list"></ul>
        </section>
      </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
