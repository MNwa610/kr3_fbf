<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Офлайн</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="container">
        <section class="card">
          <h1 class="card__title">Офлайн-режим</h1>
          <p class="card__hint">
            Кажется, сеть временно недоступна. Основные ресурсы приложения все равно сохранены в кэше.
          </p>
          <p class="card__hint">
            Попробуйте обновить страницу, когда подключение восстановится.
          </p>
          <p class="card__hint">
            Если вы уже установили PWA, приложение всё равно будет продолжать работать в автономном режиме.
          </p>
        </section>
      </main>
    </div>
